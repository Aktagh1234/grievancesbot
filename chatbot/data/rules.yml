version: "3.1"

rules:

- rule: Greet and begin conversation
  steps:
    - intent: greet
    - action: action_set_email_slot
    - action: action_detect_language
    - action: action_utter_greet
    - action: action_utter_ask_state

- rule: Handle State Provided
  steps:
    - intent: provide_state
    - action: action_utter_ask_area

- rule: Handle Area Provided
  steps:
    - intent: provide_area
    - action: action_utter_ask_department

- rule: Handle Department Provided
  steps:
    - intent: provide_department
    - action: action_utter_ask_complaint_details

- rule: Handle Complaint Provided
  steps:
    - intent: provide_complaint_details
    - action: action_generate_draft
    - action: action_utter_ask_confirmation

- rule: Submit Complaint
  steps:
    - intent: confirm
    - action: action_submit_complaint
    - action: action_utter_thank_you

- rule: Cancel Complaint Submission
  steps:
    - intent: deny
    - action: action_utter_goodbye